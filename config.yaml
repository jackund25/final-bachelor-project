# Configuration for Diabetes Digital Twin System

# Data Generation Settings
data:
  num_patients: 10
  days_per_patient: 7
  sampling_interval_min: 5
  output_dir: "data/raw"
  seed: 42
  primary_source: "ohio_t1dm"
  fallback_source: "latest_generated"
  smbg_interval_min: 240  # 4-jam cadence ≈ 6 pembacaan/hari (surrogate SMBG)

# Patient Parameters (for simulation)
patient:
  baseline_glucose: 100 # mg/dL
  glucose_threshold_low: 70
  glucose_threshold_high: 180
  insulin_sensitivity: 50 # mg/dL per unit
  carb_ratio: 10 # grams per unit

# Digital Twin Settings
digital_twin:
  update_frequency_min: 5
  history_window_hours: 24
  state_file: "data/processed/patient_states.json"

# Model Training
model:
  name: "RandomForest" # Options: RandomForest, Simulation
  sequence_length: 12 # 1 hour with 5-min intervals
  features: ["glucose", "carbs", "insulin", "activity", "stress"]

  # sequence_length=12 → look-back 1 jam pada cadence CGM 5-menit
  # smbg_sequence_length=6 → look-back ~1 hari pada cadence SMBG 240-menit
  smbg_sequence_length: 6

  random_forest:
    n_estimators: 200
    max_depth: 20
    min_samples_split: 5

  lstm:
    units_1: 64
    units_2: 32
    dropout: 0.2
    learning_rate: 0.001
    epochs: 100
    patience: 10

# RAG Settings
rag:
  knowledge_base_dir: "data/knowledge_base"
  chunk_size: 900       # Must match _DEFAULT_CHUNK_SIZE in knowledge_base.py
  chunk_overlap: 120    # Must match _DEFAULT_CHUNK_OVERLAP in knowledge_base.py
  embedding_model: "all-MiniLM-L6-v2"
  top_k_retrieval: 4    # Aligns with pipeline.py default (top_k=4)

  llm:
    provider: "gemini"  # Options: gemini, ollama, template
    model: "gemini-1.5-flash"
    # Low temperature (0.2) for clinical safety: reduces hallucination risk in medical advisory.
    # Values >0.5 produce varied language but risk fabricating dosage/threshold figures.
    temperature: 0.2
    max_tokens: 300

# Evaluation
evaluation:
  test_split: 0.2
  metrics: ["RMSE", "MAE", "MAPE", "ClarkeErrorGrid"]
  clarke_zones: ["A", "B", "C", "D", "E"]

# Logging
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/system.log"
